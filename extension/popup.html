<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tab Out</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <main class="popup-shell">
    <header class="popup-header">
      <img src="icons/icon48.png" alt="" width="32" height="32">
      <div>
        <h1>Tab Out</h1>
        <span id="popupStatus">Loading</span>
      </div>
    </header>

    <section class="popup-stats" aria-label="Summary">
      <div><strong id="popupTabs">0</strong><span>tabs</span></div>
      <div><strong id="popupSaved">0</strong><span>saved</span></div>
      <div><strong id="popupGroups">0</strong><span>group saves</span></div>
      <div><strong id="popupFavorites">0</strong><span>bookmarks</span></div>
    </section>

    <section class="popup-actions" aria-label="Actions">
      <button data-action="favorite-group">Save current group</button>
      <button data-action="favorite-tab">Save current tab/site</button>
      <button data-action="open-view" data-view="groups">Open Tab Out</button>
      <button data-action="export-data">Export Tab Out data</button>
      <button data-action="choose-import-data">Import Tab Out data</button>
      <input id="popupImportFile" type="file" accept="application/json,.json" hidden>
    </section>
  </main>

  <script src="popup.js"></script>
</body>
</html>
